<svg style="display: none;">
  <filter id="ripple-filter">
    <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacement" />
  </filter>
</svg>


<script>
const rippleLayer = document.getElementById('ripple-layer');
const sides = document.querySelectorAll('.coin-side');
let currentIndex = 0;

function rotateModel() {
  const current = sides[currentIndex];
  currentIndex = (currentIndex + 1) % sides.length;
  const next = sides[currentIndex];

  // Reset a spuštění animace prstenců
  rippleLayer.classList.remove('animate-puffy');
  void rippleLayer.offsetWidth; // Force reflow
  rippleLayer.classList.add('animate-puffy');

  // Výměna fotky nastane, když je vlna v největším rozkvětu
  setTimeout(() => {
    current.classList.remove('active');
    next.classList.add('active');
  }, 800); // Polovina animace prstenců
}

setInterval(rotateModel, 5000);





</script>
