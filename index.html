<script>
const rippleLayer = document.getElementById('ripple-layer');
const portraits = document.querySelectorAll('.hero__portrait');
let currentIndex = 0;

function rotateModel() {
  const current = portraits[currentIndex];
  currentIndex = (currentIndex + 1) % portraits.length;
  const next = portraits[currentIndex];

  rippleLayer.classList.remove('hero__ripples--animate');
  void rippleLayer.offsetWidth; 
  rippleLayer.classList.add('hero__ripples--animate');

  setTimeout(() => {
    current.classList.remove('hero__portrait--active');
    next.classList.add('hero__portrait--active');
  }, 500);
}
setInterval(rotateModel, 5000);
</script>
