<script>

const rippleLayer = document.getElementById('ripple-layer');
const slides = document.querySelectorAll('.model-portrait__photo');

let currentIndex = 0;

function rotateModel() {

const current = slides[currentIndex];

currentIndex = (currentIndex + 1) % slides.length;

const next = slides[currentIndex];

rippleLayer.classList.remove('is-animating');
void rippleLayer.offsetWidth;
rippleLayer.classList.add('is-animating');

setTimeout(() => {

current.classList.remove('is-active');
next.classList.add('is-active');

}, 500);

}

rotateModel();
setInterval(rotateModel, 5000);

</script>
